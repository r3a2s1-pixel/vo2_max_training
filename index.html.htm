<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>VO2 Max Training</title>

<style>
    :root {
        --bg: #050710;
        --card: #151827;
        --accent: #4CAF50;
        --accent-soft: rgba(76, 175, 80, 0.15);
        --text-main: #ffffff;
        --text-muted: #a5a8c3;
        --border-soft: #262a3d;
    }

    * { 
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #1b2140 0, var(--bg) 55%);
        color: var(--text-main);
    }

    .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 16px 16px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .app-header {
        text-align: left;
        padding-top: 8px;
    }

    .app-title {
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    .summary-card {
        background: linear-gradient(135deg, #1e263d, #141827);
        border-radius: 18px;
        padding: 14px 16px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
    }

    .summary-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-muted);
    }

    .summary-value {
        font-size: 26px;
        font-weight: 700;
        margin-top: 4px;
    }

    .cards {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .card {
        background: var(--card);
        border-radius: 18px;
        padding: 16px;
        border: 1px solid var(--border-soft);
    }

    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .card-title {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--text-muted);
    }

    .chip {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-soft);
        color: var(--text-muted);
    }

    .current-main {
        text-align: center;
        margin-top: 10px;
    }

    .phase-name {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 2px;
    }

    .phase-speed {
        font-size: 13px;
        color: var(--text-muted);
    }

    .timer {
        font-size: 38px;
        font-weight: 700;
        margin-top: 12px;
        letter-spacing: 0.05em;
    }

    .next-body {
        margin-top: 8px;
        font-size: 14px;
    }

    .next-name {
        font-weight: 600;
    }

    .next-meta {
        font-size: 12px;
        color: var(--text-muted);
    }

    .config-card {
        background: var(--card);
        border-radius: 18px;
        padding: 16px;
        border: 1px dashed var(--border-soft);
    }

    .config-label {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 4px;
    }

    .config-row {
        display: flex;
        gap: 8px;
    }

    .config-input {
        flex: 1;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: #0c0f1c;
        color: var(--text-main);
        font-size: 16px;
    }

    .primary-text-btn {
        padding: 10px 14px;
        border-radius: 12px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
        border: none;
        cursor: pointer;
    }

    .controls {
        display: flex;
        gap: 10px;
        margin-top: auto;
    }

    .btn {
        flex: 1;
        padding: 14px;
        border-radius: 999px;
        border: none;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #24283a; color: #fff; }
    .btn-danger { background: #c0392b; color: #fff; }

    .btn-icon {
        font-size: 18px;
        line-height: 1;
        display: inline-block;
        transform: translateY(1px);
    }
</style>

<script>
    let totalMinutes = 40;
    const percentages = { warmup: 0.10, intervals: 0.80, cooldown: 0.10 };

    let phases = [];
    let i = 0;
    let timeLeft = 0;
    let timer = null;

    // Wake Lock
    let wakeLock = null;

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (e) {}
    }

    async function releaseWakeLock() {
        try {
            if (wakeLock) await wakeLock.release();
            wakeLock = null;
        } catch (e) {}
    }

    document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState === "visible" && timer && !wakeLock) {
            await requestWakeLock();
        }
    });

    function recalcPhases(totalMinutes) {
        const warm = Math.round(totalMinutes * percentages.warmup);
        const ints = Math.round(totalMinutes * percentages.intervals);
        const cool = Math.round(totalMinutes * percentages.cooldown);

        const runMin = 4;
        let possible = Math.floor(ints / runMin);
        if (possible < 1) possible = 1;
        if (possible > 4) possible = 4;

        const used = possible * runMin;
        const recovery = ints - used;
        const recEach = possible > 0 ? recovery / possible : 0;

        const out = [];
        out.push({name:"Warm-Up", speed:"5–7 km/h", duration:warm});

        for (let x=1; x<=possible; x++) {
            out.push({name:`Run ${x}`, speed:"8–10 km/h", duration:runMin});
            if (recEach > 0) out.push({name:`Recovery ${x}`, speed:"4–6 km/h", duration:Math.round(recEach)});
        }

        if (cool > 0) out.push({name:"Cool Down", speed:"4–5 km/h", duration:cool});

        return out;
    }

    function getTotalRemaining() {
        let t = timeLeft;
        for (let x=i+1;x<phases.length;x++){ t += phases[x].duration*60; }
        return t;
    }

    function format(sec) {
        const m = Math.floor(sec/60);
        const s = sec%60;
        return m + ":" + (s<10?"0":"") + s;
    }

    function updateNext() {
        const nextBox = document.getElementById("nextInfo");

        if (i+1 >= phases.length) {
            nextBox.innerHTML = "<div class='next-name'>Finish 🎉</div>";
            return;
        }

        const p = phases[i+1];
        nextBox.innerHTML = `
            <div class="next-name">${p.name}</div>
            <div class="next-meta">${p.duration} min • ${p.speed}</div>
        `;
    }

    function updateUI() {
        document.getElementById("totalRemaining").textContent = format(getTotalRemaining());
        document.getElementById("phase").textContent = phases[i].name;
        document.getElementById("speed").textContent = phases[i].speed;
        document.getElementById("time").textContent = format(timeLeft);
        updateNext();
    }

    async function start() {
        if (!timer) {
            await requestWakeLock();
            timer = setInterval(async () => {
                timeLeft--;
                if (timeLeft <= 0) {
                    i++;
                    if (i >= phases.length) {
                        clearInterval(timer);
                        timer = null;
                        await releaseWakeLock();
                        alert("Workout complete!");
                        return;
                    }
                    timeLeft = phases[i].duration * 60;
                }
                updateUI();
            }, 1000);
        }
    }

    async function pause() {
        clearInterval(timer);
        timer = null;
        await releaseWakeLock();
    }

    async function reset() {
        await pause();
        i = 0;
        timeLeft = phases[0].duration * 60;
        updateUI();
    }

    function applyTime() {
        const val = parseInt(document.getElementById("totalTimeInput").value);
        if (isNaN(val) || val <= 0) return;

        totalMinutes = val;
        phases = recalcPhases(totalMinutes);
        i = 0;
        timeLeft = phases[0].duration*60;
        updateUI();

        document.getElementById("timeConfig").style.display = "none";
    }

    window.onload = () => {
        phases = recalcPhases(totalMinutes);
        timeLeft = phases[0].duration * 60;
        updateUI();
    }
</script>
</head>

<body>
<div class="app">

    <header class="app-header">
        <h1 class="app-title">VO<sub>2</sub> max Training</h1>
    </header>

    <section class="summary-card">
        <div class="summary-label">Total Remaining</div>
        <div class="summary-value" id="totalRemaining">0:00</div>
    </section>

    <section class="cards">

        <div class="card">
            <div class="card-header">
                <div class="card-title">Current</div>
                <div class="chip">Running</div>
            </div>
            <div class="current-main">
                <div class="phase-name" id="phase">Warm-Up</div>
                <div class="phase-speed" id="speed">5–7 km/h</div>
                <div class="timer" id="time">0:00</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">Next</div>
                <div class="chip">Preview</div>
            </div>
            <div class="next-body" id="nextInfo"></div>
        </div>

        <div id="timeConfig" class="config-card">
            <div class="config-label">Total workout time (minutes)</div>
            <div class="config-row">
                <input type="number" id="totalTimeInput" class="config-input" value="40">
                <button class="primary-text-btn" onclick="applyTime()">Set</button>
            </div>
        </div>

    </section>

    <section class="controls">
        <button class="btn btn-primary" onclick="start()">
            <span class="btn-icon">▶</span>
            <span>Start</span>
        </button>
        <button class="btn btn-secondary" onclick="pause()">
            <span class="btn-icon">II</span>
            <span>Pause</span>
        </button>
        <button class="btn btn-danger" onclick="reset()">
            <span class="btn-icon">■</span>
            <span>Reset</span>
        </button>
    </section>

</div>
</body>
</html>
